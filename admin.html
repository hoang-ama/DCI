        // Helper: simple slugify (same behavior as site)
        function slugify(text) {
            if (!text) return '';
            return text.toString().toLowerCase()
                .trim()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/[\s-]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        // Helper: create job with an auto-incrementing numeric sequence (stored in `seq` field)
        async function createJobWithSeq(collectionName, data) {
            const counterRef = db.collection('counters').doc(collectionName);
            try {
                await db.runTransaction(async (t) => {
                    const counterDoc = await t.get(counterRef);
                    let nextId = 1;
                    if (counterDoc.exists) {
                        const last = counterDoc.data().lastId || 0;
                        nextId = last + 1;
                    }

                    // update counter
                    t.set(counterRef, { lastId: nextId }, { merge: true });

                    // create new job document with auto doc id and numeric seq
                    const jobRef = db.collection(collectionName).doc();
                    const jobData = {
                        ...data,
                        seq: nextId,
                        slug: data.slug || slugify(data.title || ''),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    t.set(jobRef, jobData);
                });
            } catch (err) {
                throw err;
            }
        }

                                    type="radio" 
                                    value="folder" 
                                    checked={imageMode === 'folder'} 
                                    onChange={(e) => setImageMode(e.target.value)}
                                    className="mr-2"
                                />
                                <span>Select from Folder</span>
                            </label>
                        </div>
                    </div>

                    {imageMode === 'url' ? (
                        <div>
                            <input 
                                type="text" 
                                placeholder="Enter image URL (http://... or https://...)"
                                value={value || ''}
                                onChange={handleUrlChange}
                                className="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                            />
                            {value && value.startsWith('http') && (
                                <div className="mt-3">
                                    <img src={value} alt="Preview" className="max-w-xs max-h-32 rounded border" />
                                </div>
                            )}
                        </div>
                    ) : (
                        <div>
                            <p className="text-sm text-gray-600 mb-3">Select an image from the /image folder:</p>
                            <div className="grid grid-cols-3 gap-3 max-h-64 overflow-y-auto">
                                {availableImages.map(img => (
                                    <div key={img} className="cursor-pointer">
                                        <button
                                            type="button"
                                            onClick={() => handleImageSelect(img)}
                                            className={`w-full p-2 rounded text-sm border text-center truncate transition ${
                                                value === `./image/${img}` 
                                                    ? 'border-green-600 bg-green-100 font-bold' 
                                                    : 'border-gray-300 hover:bg-gray-100'
                                            }`}
                                            title={img}
                                        >
                                            {img}
                                        </button>
                                    </div>
                                ))}
                            </div>
                            {value && value.startsWith('./image/') && (
                                <div className="mt-3">
                                    <img src={value} alt="Preview" className="max-w-xs max-h-32 rounded border" />
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Generic Item Editor (Dynamic Form) ---
        const ItemEditor = ({ collectionName, item, onSave, onCancel }) => {
            const [formData, setFormData] = useState(() => {
                if (!item) return {};
                const normalized = { ...item };
                if (Array.isArray(normalized.tags)) {
                    normalized.tags = normalized.tags.join(', ');
                }
                return normalized;
            });
            const [saving, setSaving] = useState(false);

            useEffect(() => {
                if (!item) {
                    setFormData({});
                    return;
                }
                const normalized = { ...item };
                if (Array.isArray(normalized.tags)) {
                    normalized.tags = normalized.tags.join(', ');
                }
                setFormData(normalized);
            }, [item]);

            // Data schema configuration for each type
            const schema = {
                'posts': [
                    { key: 'title', label: 'Post Title', type: 'text' },
                    { key: 'date', label: 'Date (YYYY-MM-DD)', type: 'date' },
                    { key: 'author', label: 'Author', type: 'text' },
                    { key: 'category', label: 'Category', type: 'select', options: ['Studio', 'Investor', 'Founder', 'Startup'] },
                    { key: 'tags', label: 'Tags (comma separated)', type: 'text' },
                    { key: 'featured', label: 'Featured on Homepage', type: 'checkbox' },
                    { key: 'image', label: 'Cover Image URL', type: 'image' },
                    { key: 'summary', label: 'Short Summary', type: 'textarea' },
                    { key: 'content', label: 'Content (Markdown)', type: 'markdown' }
                ],
                'jobs': [
                    { key: 'title', label: 'Job Title', type: 'text' },
                    { key: 'department', label: 'Department', type: 'select', options: ['Technology', 'Business', 'Marketing', 'HR', 'Other'] },
                    { key: 'type', label: 'Type', type: 'select', options: ['Full-time', 'Part-time', 'Internship'] },
                    { key: 'location', label: 'Location', type: 'text' },
                    { key: 'company', label: 'Company', type: 'select', options: ['DCI Studio', 'DiChung', 'Chungxe', 'DC Tech', 'Other'] },
                    { key: 'summary', label: 'Short Description', type: 'textarea' },
                    { key: 'link', label: 'Link (Apply or external URL)', type: 'text' },
                    { key: 'slug', label: 'Slug (optional)', type: 'text' },
                    { key: 'salary', label: 'Salary', type: 'text' },
                    { key: 'content', label: 'Job Description (Markdown)', type: 'markdown' }
                ],
                'companies': [
                    { key: 'id', label: 'ID (auto from name)', type: 'text' },
                    { key: 'name', label: 'Startup/Company Name', type: 'text' },
                    { key: 'logo', label: 'Logo', type: 'image' },
                    { key: 'heroImage', label: 'Hero Image', type: 'image' },
                    { key: 'vertical', label: 'Vertical', type: 'select', options: ['Shared Mobility', 'Transport', 'Travel', 'Logistics', 'Software', 'Automotive', 'eCommerce', 'Agriculture', 'Community', 'Other'] },
                    { key: 'pillar', label: 'Pillar', type: 'select', options: ['Sharing & Rental Economy', 'Membership & Subscription Economy', 'Green & Circular Economy'] },
                    { key: 'stage', label: 'Stage', type: 'select', options: ['Proof-of-Concept', 'Seed', 'Growth', 'Transition'] },
                    { key: 'year', label: 'Year Founded', type: 'text' },
                    { key: 'website', label: 'Website URL', type: 'text' },
                    { key: 'email', label: 'Contact Email', type: 'text' },
                    { key: 'description', label: 'Short description', type: 'textarea' },
                    { key: 'content', label: 'Details (Markdown)', type: 'markdown' }
                ]
            };

            const fields = schema[collectionName] || [];

            const handleChange = (key, value) => {
                setFormData(prev => ({ ...prev, [key]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSaving(true);
                try {
                    const preparedData = { ...formData };
                    if (preparedData.isVisible === undefined) preparedData.isVisible = true;
                    if (collectionName === 'posts') {
                        preparedData.slug = preparedData.slug || slugify(preparedData.title || '');
                        preparedData.tags = typeof preparedData.tags === 'string'
                            ? preparedData.tags.split(',').map(t => t.trim()).filter(Boolean)
                            : (Array.isArray(preparedData.tags) ? preparedData.tags : []);
                        if (!preparedData.summary && preparedData.content) {
                            preparedData.summary = preparedData.content.slice(0, 180).trim();
                        }
                    } else if (collectionName === 'jobs') {
                        preparedData.slug = preparedData.slug || slugify(preparedData.title || '');
                    }

                    if (item && item.id) {
                        // Update
                        await db.collection(collectionName).doc(item.id).update({
                            ...preparedData,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } else {
                        // Create
                        if (collectionName === 'jobs') {
                            // Use transaction to create job and assign ascending seq id
                            await createJobWithSeq(collectionName, {
                                ...preparedData
                            });
                        } else if (collectionName === 'companies') {
                            // Use company name as document id (slugified)
                            const companyId = (formData.id && formData.id.trim()) ? formData.id.trim() : slugify(formData.name || '');
                            if (!companyId) throw new Error('Company name required to generate ID');
                            await db.collection('companies').doc(companyId).set({
                                id: companyId,
                                name: preparedData.name || '',
                                logo: preparedData.logo || '',
                                heroImage: preparedData.heroImage || '',
                                vertical: preparedData.vertical || '',
                                pillar: preparedData.pillar || '',
                                stage: preparedData.stage || '',
                                year: preparedData.year || '',
                                website: preparedData.website || '',
                                email: preparedData.email || '',
                                description: preparedData.description || '',
                                content: preparedData.content || '',
                                details: preparedData.content || '',
                                isVisible: preparedData.isVisible !== false,
                                showOnHome: preparedData.showOnHome === true,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true });
                        } else {
                            await db.collection(collectionName).add({
                                ...preparedData,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                        }
                    }
                    onSave();
                } catch (error) {
                    alert("Error saving: " + error.message);
                    setSaving(false);
                }
            };

            return (
                <div className="bg-white p-6 rounded shadow">
                    <h2 className="text-xl font-bold mb-4 border-b pb-2">
                        {item ? 'Edit' : 'Add New'} - {collectionName === 'posts' ? 'Post' : collectionName === 'jobs' ? 'Job' : 'Portfolio'}
                    </h2>
                    <form onSubmit={handleSubmit}>
                        {fields.map(field => (
                            <div key={field.key} className="mb-4">
                                {field.type === 'checkbox' ? (
                                    <label className="flex items-center">
                                        <input 
                                            type="checkbox" 
                                            className="mr-2 w-4 h-4"
                                            checked={formData[field.key] || false}
                                            onChange={(e) => handleChange(field.key, e.target.checked)}
                                        />
                                        <span className="text-gray-700 text-sm font-bold">{field.label}</span>
                                    </label>
                                ) : (
                                    <>
                                        <label className="block text-gray-700 text-sm font-bold mb-2">{field.label}</label>
                                        {field.type === 'text' || field.type === 'date' ? (
                                            <input 
                                                type={field.type} 
                                                className="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                                                value={formData[field.key] || ''}
                                                onChange={(e) => handleChange(field.key, e.target.value)}
                                                required={field.key === 'title' || field.key === 'name'}
                                            />
                                        ) : field.type === 'select' ? (
                                            <select 
                                                className="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                                                value={formData[field.key] || ''}
                                                onChange={(e) => handleChange(field.key, e.target.value)}
                                            >
                                                <option value="">-- Select {field.label} --</option>
                                                {field.options && field.options.map(opt => (
                                                    <option key={opt} value={opt}>{opt}</option>
                                                ))}
                                            </select>
                                        ) : field.type === 'textarea' ? (
                                            <textarea 
                                                className="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                                                rows="3"
                                                value={formData[field.key] || ''}
                                                onChange={(e) => handleChange(field.key, e.target.value)}
                                            />
                                        ) : field.type === 'markdown' ? (
                                            <textarea 
                                                className="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline markdown-editor bg-gray-50"
                                                rows="10"
                                                value={formData[field.key] || ''}
                                                onChange={(e) => handleChange(field.key, e.target.value)}
                                                placeholder="# Write Markdown content here..."
                                            />
                                        ) : field.type === 'image' ? (
                                            <ImageSelector 
                                                value={formData[field.key] || ''}
                                                onChange={(value) => handleChange(field.key, value)}
                                            />
                                        ) : null}
                                    </>
                                )}
                            </div>
                        ))}
                        <div className="flex justify-end gap-3 mt-6">
                            <button type="button" onClick={onCancel} className="bg-gray-500 text-white font-bold py-2 px-4 rounded hover:bg-gray-700">
                                Cancel
                            </button>
                            <button type="submit" disabled={saving} className="bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700">
                                {saving ? 'Saving...' : 'Save Data'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        // --- Data List Component ---
        const DataList = ({ collectionName, onEdit, onImportStaticPosts, onImportStaticJobs, onImportStaticCompanies, importInProgress, importMessage }) => {
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setLoading(true);
                const unsubscribe = db.collection(collectionName).orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setItems(data);
                    setLoading(false);
                }, (error) => {
                    console.error("Error fetching data: ", error);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [collectionName]);

            const handleDelete = async (id) => {
                if (confirm('Are you sure you want to delete this item? This action cannot be undone.')) {
                    try {
                        await db.collection(collectionName).doc(id).delete();
                    } catch (err) {
                        alert('Delete failed: ' + err.message);
                    }
                }
            };

            const handleToggleVisibility = async (item) => {
                try {
                    const currentlyVisible = item.isVisible !== false;
                    await db.collection(collectionName).doc(item.id).update({
                        isVisible: !currentlyVisible,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (err) {
                    alert('Update visibility failed: ' + err.message);
                }
            };

            const handleToggleHomeFeatured = async (item) => {
                if (collectionName !== 'companies') return;
                try {
                    const onHome = item.showOnHome === true;
                    await db.collection(collectionName).doc(item.id).update({
                        showOnHome: !onHome,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (err) {
                    alert('Update homepage visibility failed: ' + err.message);
                }
            };

            const handleTogglePostFeatured = async (item) => {
                if (collectionName !== 'posts') return;
                try {
                    const featured = item.featured === true;
                    await db.collection(collectionName).doc(item.id).update({
                        featured: !featured,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (err) {
                    alert('Update featured post failed: ' + err.message);
                }
            };

            if (loading) return <div className="flex justify-center p-10"><div className="loader"></div></div>;

            return (
                <div>
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-gray-800 capitalize">
                            List of {collectionName === 'posts' ? 'Posts' : collectionName === 'jobs' ? 'Jobs' : 'Portfolio'}
                        </h2>
                        <div className="flex gap-2">
                            <button onClick={() => onEdit(null)} className="bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">
                                <i className="fas fa-plus mr-2"></i> Add New
                            </button>
                        </div>
                    </div>

                    <div className="bg-white shadow-md rounded my-6 overflow-x-auto">
                        <table className="min-w-full table-auto">
                            <thead>
                                <tr className="bg-gray-200 text-gray-600 uppercase text-sm leading-normal">
                                    <th className="py-3 px-6 text-left">Title / Name</th>
                                    <th className="py-3 px-6 text-left">Additional Info</th>
                                    <th className="py-3 px-6 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="text-gray-600 text-sm font-light">
                                {items.length === 0 ? (
                                    <tr><td colSpan="3" className="text-center py-6">No data available.</td></tr>
                                ) : items.map(item => (
                                    <tr key={item.id} className={`border-b border-gray-200 hover:bg-gray-100 ${item.isVisible === false ? 'bg-gray-100 opacity-70' : ''}`}>
                                        <td className="py-3 px-6 text-left whitespace-nowrap">
                                            <span className="font-medium">{item.title || item.name}</span>
                                        </td>
                                        <td className="py-3 px-6 text-left">
                                            {collectionName === 'posts' && <span>{item.date} {item.featured === true ? '• Home: On' : '• Home: Off'} {item.isVisible === false ? '• Hidden' : ''}</span>}
                                            {collectionName === 'jobs' && <span>{item.location} - {item.type} {item.isVisible === false ? '• Hidden' : ''}</span>}
                                            {collectionName === 'companies' && <span>{item.vertical} {item.pillar ? `• ${item.pillar}` : ''} {item.showOnHome === true ? '• Home: On' : '• Home: Off'} {item.isVisible === false ? '• Hidden' : ''}</span>}
                                        </td>
                                        <td className="py-3 px-6 text-center">
                                            <div className="flex item-center justify-center">
                                                <button onClick={() => onEdit(item)} className="w-4 mr-2 transform hover:text-purple-500 hover:scale-110">
                                                    <i className="fas fa-edit"></i>
                                                </button>
                                                <button
                                                    onClick={() => handleToggleVisibility(item)}
                                                    className={`w-4 mr-2 transform hover:scale-110 ${item.isVisible === false ? 'hover:text-green-600' : 'hover:text-gray-700'}`}
                                                    title={item.isVisible === false ? 'Show on frontend' : 'Hide from frontend'}
                                                >
                                                    <i className={`fas ${item.isVisible === false ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                                </button>
                                                {collectionName === 'posts' && (
                                                    <button
                                                        onClick={() => handleTogglePostFeatured(item)}
                                                        className={`w-4 mr-2 transform hover:scale-110 ${item.featured === true ? 'text-amber-500 hover:text-amber-600' : 'text-gray-400 hover:text-gray-500'}`}
                                                        title={item.featured === true ? 'Hide from homepage blog section' : 'Show in homepage blog section'}
                                                    >
                                                        <i className="fas fa-star"></i>
                                                    </button>
                                                )}
                                                {collectionName === 'companies' && (
                                                    <button
                                                        onClick={() => handleToggleHomeFeatured(item)}
                                                        className={`w-4 mr-2 transform hover:scale-110 ${item.showOnHome === true ? 'text-amber-500 hover:text-amber-600' : 'text-gray-400 hover:text-gray-500'}`}
                                                        title={item.showOnHome === true ? 'Hide from homepage portfolio' : 'Show on homepage portfolio'}
                                                    >
                                                        <i className="fas fa-star"></i>
                                                    </button>
                                                )}
                                                <button onClick={() => handleDelete(item.id)} className="w-4 mr-2 transform hover:text-red-500 hover:scale-110">
                                                    <i className="fas fa-trash-alt"></i>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // --- Main Application ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('posts'); // posts, jobs, companies
            const [viewMode, setViewMode] = useState('list'); // list, edit
            const [currentItem, setCurrentItem] = useState(null);
            const [initializing, setInitializing] = useState(true);
            const [importInProgress, setImportInProgress] = useState(false);
            const [importMessage, setImportMessage] = useState('');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setInitializing(false);
                });
                return unsubscribe;
            }, []);

            if (initializing) return <div className="min-h-screen flex items-center justify-center">Loading...</div>;

            if (!user) {
                return <LoginScreen />;
            }

            const handleLogout = () => auth.signOut();

            const handleEdit = (item) => {
                setCurrentItem(item);
                setViewMode('edit');
            };

            const handleSaveSuccess = () => {
                setViewMode('list');
                setCurrentItem(null);
            };

            const handleImportStaticPosts = async () => {
                const confirmed = confirm('Import all static posts from script/posts into Firestore?\n\nThis will upsert documents with ids like static-post-14.');
                if (!confirmed) return;
                setImportInProgress(true);
                setImportMessage('Importing static posts...');
                try {
                    const result = await importStaticPostsToFirestore();
                    if (result.errors.length) {
                        setImportMessage(`Imported ${result.successCount}/${result.total}. ${result.errors.length} file(s) failed. Check console for details.`);
                        console.warn('Static import errors:', result.errors);
                    } else {
                        setImportMessage(`Imported successfully: ${result.successCount}/${result.total} static posts.`);
                    }
                } catch (err) {
                    setImportMessage(`Import failed: ${err.message}`);
                } finally {
                    setImportInProgress(false);
                }
            };

            const handleImportStaticJobs = async () => {
                const confirmed = confirm('Import all static careers from script/jobs-details into Firestore?\n\nThis will upsert documents with ids like static-job-1.');
                if (!confirmed) return;
                setImportInProgress(true);
                setImportMessage('Importing static jobs...');
                try {
                    const result = await importStaticJobsToFirestore();
                    if (result.errors.length) {
                        setImportMessage(`Imported ${result.successCount}/${result.total}. ${result.errors.length} file(s) failed. Check console for details.`);
                        console.warn('Static job import errors:', result.errors);
                    } else {
                        setImportMessage(`Imported successfully: ${result.successCount}/${result.total} static jobs.`);
                    }
                } catch (err) {
                    setImportMessage(`Import failed: ${err.message}`);
                } finally {
                    setImportInProgress(false);
                }
            };

            const handleImportStaticCompanies = async () => {
                const confirmed = confirm('Import all static portfolio companies from panel_script/companies/*.md into Firestore?\n\nThis will upsert documents by company id.');
                if (!confirmed) return;
                setImportInProgress(true);
                setImportMessage('Importing static portfolio companies...');
                try {
                    const result = await importStaticCompaniesToFirestore();
                    if (result.errors.length) {
                        setImportMessage(`Imported ${result.successCount}/${result.total}. ${result.errors.length} file(s) failed. Check console for details.`);
                        console.warn('Static company import errors:', result.errors);
                    } else {
                        setImportMessage(`Imported successfully: ${result.successCount}/${result.total} static portfolio companies.`);
                    }
                } catch (err) {
                    setImportMessage(`Import failed: ${err.message}`);
                } finally {
                    setImportInProgress(false);
                }
            };

            const renderContent = () => {
                if (viewMode === 'edit') {
                    return (
                        <ItemEditor 
                            collectionName={activeTab} 
                            item={currentItem} 
                            onSave={handleSaveSuccess} 
                            onCancel={() => setViewMode('list')}
                        />
                    );
                }
                return (
                    <DataList
                        collectionName={activeTab}
                        onEdit={handleEdit}
                        onImportStaticPosts={handleImportStaticPosts}
                        onImportStaticJobs={handleImportStaticJobs}
                        onImportStaticCompanies={handleImportStaticCompanies}
                        importInProgress={importInProgress}
                        importMessage={importMessage}
                    />
                );
            };

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-64 bg-green-900 text-white flex flex-col shadow-lg">
                        <div className="p-6 text-center border-b border-green-800">
                            <h1 className="text-2xl font-bold">DCI Admin</h1>
                        </div>
                        <nav className="flex-1 py-6">
                            <button 
                                onClick={() => { setActiveTab('posts'); setViewMode('list'); }}
                                className={`w-full text-left py-3 px-6 hover:bg-green-800 transition ${activeTab === 'posts' ? 'bg-green-800 border-l-4 border-yellow-400' : ''}`}
                            >
                                <i className="fas fa-blog w-6"></i> Blog / News
                            </button>
                            <button 
                                onClick={() => { setActiveTab('jobs'); setViewMode('list'); }}
                                className={`w-full text-left py-3 px-6 hover:bg-green-800 transition ${activeTab === 'jobs' ? 'bg-green-800 border-l-4 border-yellow-400' : ''}`}
                            >
                                <i className="fas fa-briefcase w-6"></i> Careers
                            </button>
                            <button 
                                onClick={() => { setActiveTab('companies'); setViewMode('list'); }}
                                className={`w-full text-left py-3 px-6 hover:bg-green-800 transition ${activeTab === 'companies' ? 'bg-green-800 border-l-4 border-yellow-400' : ''}`}
                            >
                                <i className="fas fa-building w-6"></i> Portfolio
                            </button>
                        </nav>
                        <div className="p-4 border-t border-green-800">
                            <div className="mb-2 text-sm text-green-300 truncate">{user.email}</div>
                            <button onClick={handleLogout} className="w-full bg-red-600 hover:bg-red-700 py-2 rounded text-sm">
                                Logout
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-8 overflow-y-auto">
                        {renderContent()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
